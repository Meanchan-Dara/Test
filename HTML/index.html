<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoBill POS - ServeEasy</title>
    <link rel="stylesheet" href="../CSS/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header-left">
        <i class="fas fa-bars menu-toggle"></i>
        <div class="logo">
          <span class="logo-main">Khmer Food</span>
        </div>
      </div>
      <div class="header-center">
        <span>ServeEasy POS</span>
        <span>|</span>
        <span>Khmer Food Restaurant</span>
        <span>|</span>
        <span>Counter: 1st Counter</span>
      </div>
      <div class="header-right">
        
        <div class="profile-img"></div>
      </div>
    </header>

    <div id="app-container">
      <!-- Left Menu Section -->
      <main id="menu-section">
        <div class="search-container" style="display: flex; gap: 10px;">
          <input
            type="text"
            class="search-input"
            placeholder="Search in All Items"
            style="flex: 1;"
          />
          <button id="add-card-btn" class="btn btn-primary" style="white-space: nowrap; padding: 0 1.25rem;"><i class="fas fa-plus" style="margin-right: 5px;"></i> Add Item</button>
        </div>
        <div class="items-grid" id="items-grid">
          <!-- Items will be injected here via JavaScript -->
        </div>
      </main> 

      <!-- Right Cart Section -->
      <aside id="cart-section">
        <div class="cart-header">
          <div class="cart-title">
            Dine In
            <span
              style="
                font-weight: 400;
                color: #718096;
                font-size: 0.8rem;
                border: 1px solid #e2e8f0;
                padding: 2px 4px;
                border-radius: 4px;
              "
              >T5</span
            >
          </div>
          <div class="cart-actions">
            <i class="fas fa-trash-alt" title="Clear Cart"></i>
            <i class="fas fa-hand-paper" title="Hold"></i>
            <i class="fas fa-ellipsis-v"></i>
          </div>
        </div>

        <div class="customer-info">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <span class="customer-name">Mr. Mean Chandara | 012-345-6789</span>
            <div>
              <i
                class="fas fa-pen"
                style="font-size: 0.8rem; margin-right: 0.5rem"
              ></i>
              <i class="fas fa-times" style="font-size: 0.8rem"></i>
            </div>
          </div>
          <div class="customer-details">Poipet, Banteay Meanchey</div>
        </div>

        <div class="cart-items">
          <!-- Sample Cart Items in Card Style -->
          <div class="cart-item">
            <div class="item-details">
              <div class="item-name">នំបញ្ចុកសម្លរប្រហើរ</div>
              <div class="item-sub">$2.50 x 1</div>
            </div>
            <div class="item-price-actions">
              <div class="item-price">$2.50</div>
              <div class="item-remove-btn">
                <i class="fas fa-trash-alt"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="cart-footer">
          <div class="total-row">
            <div>
              <span class="total-label">Total</span>
              <div style="font-size: 0.75rem; color: #718096">
                (Items: 5, Quantity: 14)
              </div>
            </div>
            <span class="total-amount"
              ><span
                class="real-currency"
                style="font-size: 1rem; color: var(--primary); opacity: 0.8"
                >$</span
              >4.75</span
            >
          </div>
          <div class="payment-buttons">
            <div class="btn btn-primary btn-full">Confirm Order</div>
          </div>
        </div>
      </aside>
    </div>

    <footer id="footer">
      <p>&copy; 2026 <span>All rights reserved.</span></p>
    </footer>

    <!-- Add Item Modal -->
    <div id="add-item-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Add New Item</h2>
          <i class="fas fa-times close-modal"></i>
        </div>
        <form id="add-item-form">
          <div class="form-group">
            <label for="item-name">Item Name <span class="required">*</span></label>
            <input type="text" id="item-name" name="itemName" placeholder="e.g. Fried Rice" />
            <div class="error-msg" id="name-error"></div>
          </div>
          <div class="form-group">
            <label for="item-price">Price ($) <span class="required">*</span></label>
            <input type="number" id="item-price" name="itemPrice" placeholder="e.g. 2.50" step="0.01" />
            <div class="error-msg" id="price-error"></div>
          </div>
          <div class="form-group">
            <label>Image File <span class="required">*</span></label>
            <div class="file-upload-container">
              <input type="file" id="item-image" name="itemImage" accept="image/*" class="file-input-hidden" />
              <label for="item-image" class="file-upload-label">
                <i class="fas fa-cloud-upload-alt"></i>
                <span class="file-upload-text">Click to choose an image</span>
              </label>
              <div class="image-preview-container" style="display: none;">
                <img id="image-preview" src="" alt="Preview" />
                <i class="fas fa-times-circle remove-image-btn" id="remove-image-btn"></i>
              </div>
            </div>
            <div class="error-msg" id="image-error"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn close-modal-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Item</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../JS/index.js"></script>
  </body>
</html>
